name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, gd
    - uses: actions/checkout@v4
    - name: Copy .env for UIMP Core
      run: php -r "copy('uimp-core/.env.example', 'uimp-core/.env');"
    - name: Install Dependencies for UIMP Core
      run: |
        cd uimp-core
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs
    - name: Generate key for UIMP Core
      run: |
        cd uimp-core
        php artisan key:generate
    - name: Directory Permissions for UIMP Core
      run: chmod -R 777 uimp-core/storage uimp-core/bootstrap/cache
    - name: Create Database for UIMP Core
      run: |
        mkdir -p uimp-core/database
        touch uimp-core/database/database.sqlite
    - name: Execute UIMP Core tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        cd uimp-core
        php artisan test

    - name: Copy .env for RGMS Subsystem
      run: php -r "copy('rgms-subsystem/.env.example', 'rgms-subsystem/.env');"
    - name: Install Dependencies for RGMS Subsystem
      run: |
        cd rgms-subsystem
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs
    - name: Generate key for RGMS Subsystem
      run: |
        cd rgms-subsystem
        php artisan key:generate
    - name: Directory Permissions for RGMS Subsystem
      run: chmod -R 777 rgms-subsystem/storage rgms-subsystem/bootstrap/cache
    - name: Create Database for RGMS Subsystem
      run: |
        mkdir -p rgms-subsystem/database
        touch rgms-subsystem/database/database.sqlite
    - name: Execute RGMS Subsystem tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        cd rgms-subsystem
        php artisan test
